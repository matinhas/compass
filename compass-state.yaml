# ── Architecture Decisions ─────────────────────────────────────────────────────

architecture_decisions:
  - ClickUp is the operational hub — all captures surface there as tasks
  - PostgreSQL from day one — no SQLite, no shortcuts
  - ClickUp failure never blocks capture creation (fire-and-forget)
  - Capture ID is human-readable (CAP-00001) derived from integer PK, not stored in DB
  - Alembic owns schema — no create_all in app startup
  - Procfile is the Railway start command (Dockerfile removed — caused PORT conflict)
  - compass-state.yaml is development truth; ClickUp is operational truth. If they disagree, developers follow compass-state.yaml and management follows ClickUp. Periodic sync keeps them aligned.
  - Gmail integration uses per-account refresh tokens: GOOGLE_REFRESH_TOKEN_<ACCOUNT_EMAIL_UPPERCASED> (@ and . replaced with _)
  - All external sources flow through NormalizedCapture → create_capture_from_source → existing classify + ClickUp pipeline
  - Duplicate protection: external_id unique check before insert (indexed)
  - respond.io API is contact-centric: conversations are managed via contact identifiers at /v2/contact/list; no separate conversations resource exists
  - respond.io MCP server installed at .mcp.json (project scope) for API exploration
  - compass-state.yaml is the sync source; POST /sync/roadmap pushes to ClickUp (CLICKUP_ROADMAP_LIST_ID + CLICKUP_COMMITMENTS_LIST_ID)
  - Roadmap tasks named [MVP-XXX] Name; commitment tasks named [CMP-XXX] Title
  - Compass MCP server (FastMCP) mounted at /mcp via SSE; 6 tools expose DB + roadmap data; registered in .mcp.json as SSE URL (no subprocess)
  - MCP tools use SessionLocal() directly with try/finally (no FastAPI Depends injection)

