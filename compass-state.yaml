architecture_decisions:
  - ClickUp is the operational hub — all captures surface there as tasks
  - PostgreSQL from day one — no SQLite, no shortcuts
  - ClickUp failure never blocks capture creation (fire-and-forget)
  - Capture ID is human-readable (CAP-00001) derived from integer PK, not stored in DB
  - Alembic owns schema — no create_all in app startup
  - Railway start command runs migrations before uvicorn

roadmap:
  MVP-001:
    name: Capture → ClickUp Inbox
    status: in_progress
    goal: POST /captures stores capture and creates ClickUp Inbox task. No AI. No classification. Just capture.

  MVP-002:
    name: Inbox Classification
    status: planned
    goal: AI classifies each capture — Task, Project, Decision, Reference, Alert

  MVP-003:
    name: Daily Briefing
    status: planned
    goal: Automated daily summary of what deserves attention

  MVP-004:
    name: Attention Engine
    status: planned
    goal: Ranking and prioritisation across all captures

  MVP-005:
    name: Integrations
    status: planned
    goal: Gmail, respond.io, Izibizi, WordPress

