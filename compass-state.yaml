# ── Roadmap ────────────────────────────────────────────────────────────────────

roadmap:
  MVP-001:
    name: Capture → ClickUp Inbox
    goal: POST /capture stores capture and creates ClickUp Inbox task. No AI. No classification. Just capture.
    status: in_progress
    success_criteria:
      - POST /captures returns 201 with capture_id
      - Capture stored in PostgreSQL
      - ClickUp Inbox task created automatically

  MVP-002:
    name: Inbox Classification
    goal: AI classifies each capture into a type on arrival
    status: planned
    types: [Task, Project, Decision, Reference, Alert]

  MVP-003:
    name: Daily Briefing
    goal: Automated daily summary — what deserves attention today?
    status: planned

  MVP-004:
    name: Attention Engine
    goal: Ranking and prioritisation across all captures
    status: planned

  MVP-005:
    name: Integrations
    goal: Pull captures from external sources automatically
    status: planned
    integrations: [Gmail, respond.io, Izibizi, WordPress]

